name: Release

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build app
        run: scripts/build-app.sh

      - name: Package app
        run: |
          VERSION="$(plutil -extract CFBundleShortVersionString raw -o - Resources/Info.plist)"
          ASSET="dist/CodexQuotaBar-v${VERSION}-macos-arm64.zip"
          mkdir -p dist
          ditto --norsrc -c -k --keepParent .build/CodexQuotaBar.app "$ASSET"
          shasum -a 256 "$ASSET" > "${ASSET}.sha256"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${VERSION}"
          NOTES="$(cat <<EOF
          CodexQuotaBar ${TAG}

          macOS menu bar app for showing Codex quota usage.

          SHA256:
          $(cat "${ASSET}.sha256")
          EOF
          )"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" "${ASSET}.sha256" --clobber
          else
            gh release create "$TAG" "$ASSET" "${ASSET}.sha256" \
              --title "CodexQuotaBar ${TAG}" \
              --notes "$NOTES"
          fi
